# ============================================
# DOCKER PROFILE
# ============================================
# Activated by docker-compose via SPRING_PROFILES_ACTIVE=docker
# Uses PostgreSQL container instead of H2

# PostgreSQL (overridden by environment variables in docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in Docker
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.pos.backend=INFO
logging.level.org.hibernate.SQL=WARN
